<svg width="60" height="100" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 剑柄 -->
  <rect x="24" y="70" width="12" height="25" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <!-- 剑柄头 -->
  <circle cx="30" cy="98" r="4" fill="#DAA520"/>
  <!-- 剑身 -->
  <rect x="26" y="10" width="8" height="60" fill="#FFE8A8" stroke="#FFD700" stroke-width="1"/>
  <!-- 剑身高光 -->
  <rect x="27" y="15" width="2" height="50" fill="#FFFF99" opacity="0.9"/>
  <!-- 光晕效果 -->
  <rect x="24" y="15" width="12" height="50" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
  <!-- 剑尖 -->
  <polygon points="30,10 26,0 34,0" fill="#FFE8A8" stroke="#FFD700" stroke-width="1"/>
  <!-- 护手 -->
  <ellipse cx="30" cy="70" rx="11" ry="3" fill="#DAA520" stroke="#FFD700" stroke-width="1"/>
  <!-- 宝石装饰 -->
  <circle cx="25" cy="70" r="2" fill="#FF0000" opacity="0.8"/>
  <circle cx="35" cy="70" r="2" fill="#FF0000" opacity="0.8"/>
</svg>